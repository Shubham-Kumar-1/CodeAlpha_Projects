<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraStore | Futuristic Shopping</title>
    <meta name="description" content="Discover the future of shopping with AuraStore. Premium gadgets and accessories for the modern nomad.">
  </head>
  <body>
    <header>
      <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">AURASTORE</div>
      <nav>
        <a class="nav-link active">Shop</a>
        <div id="auth-container">
          <!-- Auth buttons will be injected here -->
        </div>
        <button class="cart-btn" onclick="toggleCart()">
          <span class="cart-count">0</span>
          🛒
        </button>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Elevate Your Digital Lifestyle</h1>
        <p>Curated premium essentials designed for precision and performance.</p>
      </section>

      <div class="products-grid">
        <!-- Products will be injected here -->
      </div>
    </main>

    <!-- Cart Drawer -->
    <div class="cart-drawer">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button class="qty-btn" onclick="toggleCart()" style="font-size: 1.5rem">×</button>
      </div>
      <div class="cart-items">
        <!-- Cart items will be injected here -->
      </div>
      <div class="cart-footer">
        <div class="total-row">
          <span>Total</span>
          <span class="cart-total-price">$0.00</span>
        </div>
        <button class="submit-btn" id="checkout-btn">Checkout Now</button>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay">
      <div class="modal-content glass">
        <button class="close-btn" onclick="closeModal('login-modal')">×</button>
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Login to your account to continue.</p>
        <form id="login-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-input" required placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="submit-btn">Login</button>
        </form>
      </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal-overlay">
      <div class="modal-content glass">
        <button class="close-btn" onclick="closeModal('register-modal')">×</button>
        <h2>Create Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Join AuraStore for exclusive drops.</p>
        <form id="register-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-input" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-input" required placeholder="name@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-input" required placeholder="••••••••">
          </div>
          <button type="submit" class="submit-btn">Register</button>
        </form>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
